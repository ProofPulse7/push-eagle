name = "push-eagle-cron"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Cron triggers - runs every 5 minutes for free on Cloudflare
[triggers]
crons = ["*/5 * * * *"]

# Environment variables (non-secret). Set secrets via: wrangler secret put CRON_SECRET
[vars]
APP_URL = "https://push-eagle-dashboard.vercel.app"
PROCESS_CAMPAIGNS_URL = "https://push-eagle-dashboard.vercel.app/api/cron/process-campaigns"
PROCESS_AUTOMATIONS_URL = "https://push-eagle-dashboard.vercel.app/api/cron/process-automations"
PROCESS_INGESTION_URL = "https://push-eagle-dashboard.vercel.app/api/cron/process-ingestion"
CAMPAIGN_SHARDS = "4"
AUTOMATION_SHARDS = "6"
INGESTION_SHARDS = "4"

# For local dev: create a .dev.vars file with:
# CRON_SECRET=your-cron-secret-here
# APP_URL=http://localhost:3000
