# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c866e24e9ce383cebeee6edb01496449"
name = "Push-Eagle"
application_url = "https://push-eagle-dashboard.vercel.app/dashboard"
embedded = false

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/app-scopes-update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/orders-create"

  [[webhooks.subscriptions]]
  topics = [ "carts/update" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/carts-update"
  include_fields = [ "id", "token", "updated_at", "line_items.product_id", "line_items.variant_id", "line_items.quantity", "line_items.url" ]

  [[webhooks.subscriptions]]
  topics = [ "checkouts/create", "checkouts/update" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/checkouts-update"
  include_fields = [ "id", "token", "abandoned_checkout_url", "updated_at", "email", "customer.id", "line_items.product_id", "line_items.variant_id", "line_items.quantity", "line_items.url", "note_attributes" ]

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/products-update"
  include_fields = [ "id", "title", "handle", "updated_at", "image.src", "variants.id", "variants.title", "variants.price", "variants.compare_at_price", "variants.inventory_item_id" ]

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/inventory-levels-update"
  include_fields = [ "inventory_item_id", "available", "updated_at", "location_id" ]

  [[webhooks.subscriptions]]
  topics = [ "fulfillments/update" ]
  uri = "https://push-eagle-dashboard.vercel.app/api/shopify/webhooks/fulfillments-update"
  include_fields = [ "id", "order_id", "status", "shipment_status", "tracking_company", "tracking_numbers", "tracking_urls", "updated_at" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_customers,read_orders,read_products,read_inventory,read_fulfillments,write_products,read_discounts,write_discounts,read_marketing_events,write_marketing_events,read_customer_events,write_pixels,read_themes,write_themes,write_files,read_metaobjects,write_metaobjects,read_metaobject_definitions,write_metaobject_definitions,read_locales,write_locales,write_app_proxy"

[auth]
redirect_urls = [
  "https://push-eagle.vercel.app/auth/callback",
  "https://push-eagle.vercel.app/auth/shopify/callback",
  "https://push-eagle.vercel.app/api/auth",
  "https://push-eagle-dashboard.vercel.app/auth/callback",
  "https://push-eagle-dashboard.vercel.app/api/auth/callback"
]

[app_proxy]
url = "https://push-eagle-dashboard.vercel.app/api/storefront"
subpath = "push-eagle"
prefix = "apps"

  [[webhooks.subscriptions]]
  uri = "https://push-eagle.vercel.app/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "https://push-eagle.vercel.app/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "https://push-eagle.vercel.app/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
